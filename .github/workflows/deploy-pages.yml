name: Deploy to GitHub Pages

on:
  push:
    branches: [main, claude/ios-app-preview-dev-zKM5b]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout collord/sqlrooms (for @sqlrooms/cesium)
        uses: actions/checkout@v4
        with:
          repository: collord/sqlrooms
          path: sqlrooms

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: client
        run: pnpm install --no-frozen-lockfile

      - name: Patch cesium package for standalone build
        run: |
          ln -sf $GITHUB_WORKSPACE/client/node_modules $GITHUB_WORKSPACE/sqlrooms/node_modules
          cat > $GITHUB_WORKSPACE/sqlrooms/packages/cesium/tsconfig.json << 'TSEOF'
          {
            "compilerOptions": {
              "target": "ES2020",
              "module": "ESNext",
              "moduleResolution": "bundler",
              "jsx": "react-jsx",
              "strict": true,
              "esModuleInterop": true,
              "skipLibCheck": true,
              "declaration": true,
              "sourceMap": true,
              "outDir": "dist"
            },
            "include": ["src"],
            "exclude": ["node_modules", "dist"]
          }
          TSEOF
          # Point package entry to source (no build step needed)
          cd $GITHUB_WORKSPACE/sqlrooms/packages/cesium
          sed -i 's|"main": "dist/index.js"|"main": "src/index.ts"|' package.json
          sed -i 's|"types": "dist/index.d.ts"|"types": "src/index.ts"|' package.json
          sed -i 's|"module": "dist/index.js"|"module": "src/index.ts"|' package.json

      - name: Build
        working-directory: client
        env:
          VITE_CESIUM_ION_TOKEN: ${{ secrets.VITE_CESIUM_ION_TOKEN }}
          VITE_DATA_URL: ./data
        run: npx vite build

      - name: Copy parquet data into build output
        run: cp -r server/data client/dist/data

      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
